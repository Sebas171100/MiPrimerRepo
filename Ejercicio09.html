<script>
    // 9 Bucle for
    // Sintaxis: for (inicio; condición; actualización)

    for (let i = 1; i <= 5; i++) {
        console.log(`Interación número ${i}`);
    }

    // Contar hacia atrás

    for (let i = 5; i >= 1; i--) {
        console.log(`Cuenta regresiva: ${i}`);
    }

    // Tabla de multiplicar del 7

    for (let i = 1; i <= 10; i++) {
        console.log(`7 x ${i} = ${7 * i}`);
    }
</script>
