<script>
    // 11 Arrays (Arreglos)

    const frutas = ["manzana", "banana", "naranja", "uva"];

    console.log(frutas[0]);       // 'manzana' (primer elemento)
    console.log(frutas[3]);       // 'uva' (cuarto elemento)
    console.log(frutas.length);   // 4 (total de elementos)

    // Modificar elementos

    frutas[1] = "mango";

    // Agregar al final

    frutas.push("kiwi");

    // Eliminar el último

    frutas.pop();

    console.log(frutas);
</script>
