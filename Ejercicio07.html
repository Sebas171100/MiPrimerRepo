<script>
    // 7 Operadores de comparación

    console.log(5 == '5');        // true   Igualdad laxa (no recomendado)
    console.log(5 === '5');       // false  Igualdad estricta (recomendado)
    console.log(5 !== '3');       // true   Diferente estricto
    console.log(10 > 5);          // true   Mayor que
    console.log(10 < 5);          // false  Menor que
    console.log(5 >= 5);          // true   Mayor o igual
    console.log(5 <= 4);          // false  Menor o igual

    // Operadores lógicos

    console.log(true && false);   // false  ADN (ambos deben ser true)
    console.log(true || false);   // true   OR (al menos uno true)
    console.log(!true);           // false  NOT (invierte)
</script>
