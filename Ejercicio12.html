<script>
    // 12 Recorrer Arrays con for...of - for...of con arrays

    const colores = ["rojo", "verde", "azul", "amarillo"];

    for (const color of colores) {
        console.log(`Color: ${color}`);
    }

    // Calcular suma de un array de números

    const números = [10, 25, 30, 15, 20];
    let suma = 0;
    for (const num of números) {
        suma += num;
    }

    console.log(`Suma total: ${suma}`);
    console.log(`Promedio: ${suma / números.length}`);
</script>
