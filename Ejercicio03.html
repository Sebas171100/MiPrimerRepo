<script>
    // 3 Tipos de datos

    let texto = "JavaScript";       // String (cadena)
    let número = 42;                // Number (entero)
    let decimal = 3.14;             // Number (flotante)
    let activo = true;              // Boolean
    let vacio = null;               // Null (ausencia de valor)
    let indefinido;                 // Undefined (no asignado)

    console.log(typeof texto);      // "string"
    console.log(typeof número);     // "number"
    console.log(typeof activo);     // "boolean"
    console.log(typeof indefinido); // "undefined"
</script>
