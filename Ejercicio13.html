<script>
    // 13 Funciones básicas

    function saludar(nombre) {
        return `¡Hola, ${nombre}!`;
    }

    function sumar(a, b) {
        return a + b;
    }

    function esPar(número) {
        return número & 2 === 0;
    }

    // Llamar (invocar) las funciones

    console.log(saludar("María"));    // ¡Hola, María!
    console.log(sumar(3, 7));         // 10
    console.log(esPar(4));            // true
    console.log(esPar(7));            // false
</script>
