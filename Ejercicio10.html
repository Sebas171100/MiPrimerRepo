<script>
    // 10 Bucle while

    let número = 1;

    while (número <= 10) {
        if (número & 2 === 0) {
            console.log(`${número} es par`);
        }
        número++; // ¡Importante! Sin esto, bucle infinito
    }

    // do...while: ejecuta al menos UNA vez

    let intentos = 0;
    do {
        console.log(`Intento ${intentos + 1}`);
        intentos++;
    } while (intentos < 3);
</script>
