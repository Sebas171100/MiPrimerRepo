<script>
    // 5 Template Literals

    const nombre = "carlos";
    const edad   = 28;
    const altura = 1.75;

    // Forma antigua (concatenación)

    console.log("Hola, me llamo " + nombre + " y tengo " + edad + " años.");

    // Forma moderna (template literal)

    console.log(`Hola, me llamo ${nombre} y tengo ${edad} años.`);

    // También puedo poner expresiones

    console.log(`En 5 años tendré ${edad + 5} años. `);
    console.log(`Altura en cm: ${altura * 100} cm`);
</script>
